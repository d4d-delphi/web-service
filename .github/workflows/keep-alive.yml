name: keep-alive

# Pings the free-tier Render backend so it doesn't spin down after 15 min idle
# (free instances sleep on inactivity → ~50s cold start on the next request).
# GitHub cron is best-effort and can be delayed a few minutes under load; every
# 10 min keeps a comfortable margin under the 15-min sleep threshold.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -m 60 https://delphi-api-wupt.onrender.com/health) && break
            echo "attempt $i failed, retrying..."; sleep 15
          done
          echo "health HTTP $code"
          test "$code" = "200"
